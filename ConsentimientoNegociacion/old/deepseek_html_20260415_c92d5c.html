<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario con Modales y Exportación</title>
    <!-- Bootstrap 5 para modales y estilos rápidos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- SheetJS para exportar a Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <!-- jsPDF y html2canvas para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #f0f2f5; padding: 20px; }
        .card-custom { max-width: 600px; margin: auto; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-pregunta { margin: 0 5px; }
        .table-responsive { margin-top: 20px; }
        .modal-nota { cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="card card-custom p-4">
        <h2 class="text-center mb-4">📋 Cuestionario Interactivo</h2>
        <div id="preguntaContainer" class="text-center">
            <!-- Aquí se carga la pregunta actual con su modal -->
        </div>
        <div class="d-flex justify-content-between mt-4">
            <button id="btnAnterior" class="btn btn-secondary" disabled><i class="fas fa-arrow-left"></i> Anterior</button>
            <button id="btnSiguiente" class="btn btn-primary">Siguiente <i class="fas fa-arrow-right"></i></button>
        </div>
        <div class="text-center mt-3">
            <button id="btnVerTabla" class="btn btn-info"><i class="fas fa-table"></i> Ver todas las respuestas (tabla)</button>
        </div>
        <div class="text-center mt-2">
            <button id="btnExportarExcel" class="btn btn-success"><i class="fas fa-file-excel"></i> Exportar a Excel</button>
            <button id="btnExportarPDF" class="btn btn-danger"><i class="fas fa-file-pdf"></i> Exportar a PDF</button>
        </div>
    </div>

    <!-- Modal para responder pregunta -->
    <div class="modal fade" id="modalPregunta" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalPreguntaTitulo">Pregunta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="modalPreguntaTexto"></p>
                    <div class="mb-3">
                        <label class="form-label">Tu respuesta:</label>
                        <input type="text" id="respuestaInput" class="form-control" placeholder="Escribe tu respuesta...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nota adicional (opcional):</label>
                        <textarea id="notaInput" class="form-control" rows="2" placeholder="Agrega una nota..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" id="guardarRespuestaBtn" class="btn btn-primary">Guardar respuesta</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para mostrar tabla de todas las respuestas -->
    <div class="modal fade" id="modalTabla" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">📊 Todas las respuestas</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="tablaResumenBody">
                    <!-- Aquí se inyectará la tabla -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // --- Datos del cuestionario: 3 preguntas sobre un tema (Tecnología) ---
    const preguntas = [
        { id: 0, texto: "¿Qué es la inteligencia artificial?" },
        { id: 1, texto: "Menciona un lenguaje de programación usado en IA." },
        { id: 2, texto: "¿Qué beneficio principal tiene el machine learning?" }
    ];

    // Almacenar respuestas: { respuesta: string, nota: string }
    let respuestas = [
        { respuesta: "", nota: "" },
        { respuesta: "", nota: "" },
        { respuesta: "", nota: "" }
    ];

    let indiceActual = 0;
    let modalPregunta, modalTabla;

    // Inicializar modales y eventos
    document.addEventListener("DOMContentLoaded", () => {
        modalPregunta = new bootstrap.Modal(document.getElementById('modalPregunta'));
        modalTabla = new bootstrap.Modal(document.getElementById('modalTabla'));

        cargarPreguntaEnDom(indiceActual);
        actualizarBotonesNavegacion();

        // Eventos de botones
        document.getElementById("btnAnterior").addEventListener("click", () => {
            if (indiceActual > 0) {
                indiceActual--;
                cargarPreguntaEnDom(indiceActual);
                actualizarBotonesNavegacion();
            }
        });

        document.getElementById("btnSiguiente").addEventListener("click", () => {
            if (indiceActual < preguntas.length - 1) {
                indiceActual++;
                cargarPreguntaEnDom(indiceActual);
                actualizarBotonesNavegacion();
            } else {
                // Si es la última pregunta, al hacer siguiente mostramos la tabla directamente (opcional)
                mostrarTablaCompleta();
            }
        });

        document.getElementById("btnVerTabla").addEventListener("click", mostrarTablaCompleta);
        document.getElementById("btnExportarExcel").addEventListener("click", exportarAExcel);
        document.getElementById("btnExportarPDF").addEventListener("click", exportarAPDF);

        // Guardar respuesta desde el modal
        document.getElementById("guardarRespuestaBtn").addEventListener("click", () => {
            const respuesta = document.getElementById("respuestaInput").value.trim();
            const nota = document.getElementById("notaInput").value.trim();
            respuestas[indiceActual] = { respuesta, nota };
            // Actualizar vista del botón de la pregunta actual
            const btnPregunta = document.querySelector(`#btnPregunta${indiceActual}`);
            if (btnPregunta) {
                if (respuesta) {
                    btnPregunta.innerHTML = `<i class="fas fa-check-circle text-success"></i> Pregunta ${indiceActual+1} respondida`;
                    btnPregunta.classList.remove("btn-outline-primary");
                    btnPregunta.classList.add("btn-success");
                } else {
                    btnPregunta.innerHTML = `Pregunta ${indiceActual+1} (sin respuesta)`;
                    btnPregunta.classList.remove("btn-success");
                    btnPregunta.classList.add("btn-outline-primary");
                }
            }
            modalPregunta.hide();
            // Opcional: mostrar feedback
        });
    });

    function cargarPreguntaEnDom(index) {
        const container = document.getElementById("preguntaContainer");
        const pregunta = preguntas[index];
        const tieneRespuesta = respuestas[index].respuesta !== "";
        container.innerHTML = `
            <h4>Pregunta ${index+1} de ${preguntas.length}</h4>
            <p class="lead">${pregunta.texto}</p>
            <button id="abrirModalBtn" class="btn btn-lg ${tieneRespuesta ? 'btn-success' : 'btn-outline-primary'}">
                ${tieneRespuesta ? '<i class="fas fa-edit"></i> Editar respuesta' : '<i class="fas fa-pen"></i> Responder pregunta'}
            </button>
            ${tieneRespuesta ? `<div class="alert alert-info mt-3"><strong>Tu respuesta actual:</strong> ${respuestas[index].respuesta}<br>
            <strong>Nota:</strong> ${respuestas[index].nota || "—"}</div>` : ''}
            <div class="mt-3">
                ${preguntas.map((p, i) => `
                    <button id="btnPregunta${i}" class="btn btn-sm m-1 ${respuestas[i].respuesta ? 'btn-success' : 'btn-outline-secondary'}" data-index="${i}">
                        ${respuestas[i].respuesta ? '✓' : '○'} Pregunta ${i+1}
                    </button>
                `).join('')}
            </div>
        `;
        // Evento para abrir modal de la pregunta actual
        document.getElementById("abrirModalBtn").addEventListener("click", () => {
            document.getElementById("modalPreguntaTitulo").innerText = `Pregunta ${index+1}`;
            document.getElementById("modalPreguntaTexto").innerText = pregunta.texto;
            document.getElementById("respuestaInput").value = respuestas[index].respuesta;
            document.getElementById("notaInput").value = respuestas[index].nota;
            modalPregunta.show();
        });
        // Eventos para botones de navegación rápida entre preguntas
        preguntas.forEach((_, i) => {
            const btn = document.getElementById(`btnPregunta${i}`);
            if (btn) {
                btn.addEventListener("click", () => {
                    indiceActual = i;
                    cargarPreguntaEnDom(indiceActual);
                    actualizarBotonesNavegacion();
                });
            }
        });
    }

    function actualizarBotonesNavegacion() {
        const btnAnt = document.getElementById("btnAnterior");
        const btnSig = document.getElementById("btnSiguiente");
        btnAnt.disabled = (indiceActual === 0);
        if (indiceActual === preguntas.length - 1) {
            btnSig.innerHTML = "Finalizar y ver tabla <i class='fas fa-table'></i>";
        } else {
            btnSig.innerHTML = "Siguiente <i class='fas fa-arrow-right'></i>";
        }
    }

    function mostrarTablaCompleta() {
        const containerTabla = document.getElementById("tablaResumenBody");
        let html = `<table class="table table-bordered table-striped">
                        <thead class="table-dark">
                            <tr><th>#</th><th>Pregunta</th><th>Respuesta</th><th>Nota</th></tr>
                        </thead>
                        <tbody>`;
        preguntas.forEach((p, idx) => {
            html += `<tr>
                        <td>${idx+1}</td>
                        <td>${p.texto}</td>
                        <td>${respuestas[idx].respuesta || "<span class='text-muted'>Sin responder</span>"}</td>
                        <td>${respuestas[idx].nota || "—"}</td>
                     </tr>`;
        });
        html += `</tbody></table>`;
        containerTabla.innerHTML = html;
        modalTabla.show();
    }

    function exportarAExcel() {
        // Preparar datos para hoja de cálculo
        const data = preguntas.map((p, idx) => ({
            "Nº": idx+1,
            "Pregunta": p.texto,
            "Respuesta": respuestas[idx].respuesta || "",
            "Nota": respuestas[idx].nota || ""
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Respuestas");
        XLSX.writeFile(wb, `cuestionario_respuestas_${new Date().toISOString().slice(0,19)}.xlsx`);
    }

    async function exportarAPDF() {
        // Generar un div temporal con la tabla y estilos para capturar
        const tempDiv = document.createElement('div');
        tempDiv.style.padding = '20px';
        tempDiv.style.backgroundColor = 'white';
        tempDiv.style.fontFamily = 'Arial, sans-serif';
        let tablaHtml = `<h2>Cuestionario - Resumen de respuestas</h2>
                         <p>Fecha: ${new Date().toLocaleString()}</p>
                         <table border="1" cellpadding="8" cellspacing="0" style="border-collapse: collapse; width: 100%;">
                            <thead><tr style="background:#ddd;"><th>#</th><th>Pregunta</th><th>Respuesta</th><th>Nota</th></tr></thead>
                            <tbody>`;
        preguntas.forEach((p, idx) => {
            tablaHtml += `<tr>
                            <td>${idx+1}</td>
                            <td>${p.texto}</td>
                            <td>${respuestas[idx].respuesta || "—"}</td>
                            <td>${respuestas[idx].nota || "—"}</td>
                          </tr>`;
        });
        tablaHtml += `</tbody></table>`;
        tempDiv.innerHTML = tablaHtml;
        document.body.appendChild(tempDiv);
        try {
            const canvas = await html2canvas(tempDiv, { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const imgWidth = 190;
            const pageHeight = 277;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            let position = 10;
            pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
            pdf.save(`cuestionario_${new Date().toISOString().slice(0,19)}.pdf`);
        } catch (error) {
            console.error("Error generando PDF", error);
            alert("Error al generar PDF. Revisa la consola.");
        }
        document.body.removeChild(tempDiv);
    }
</script>
</body>
</html>
